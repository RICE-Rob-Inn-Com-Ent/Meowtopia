syntax = "proto3";
package chctoken.chctoken.v1;

import "amino/amino.proto";
import "chctoken/chctoken/v1/params.proto";
import "gogoproto/gogo.proto";

option go_package = "chctoken/x/chctoken/types";

// GenesisState defines the chctoken module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
